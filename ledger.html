<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash Ledger Pro</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#1f1c2c,#928dab);
    color: white;
    margin:0;
}

.container {
    max-width: 400px;
    margin: auto;
    padding: 15px;
}

h2 {
    text-align: center;
}

.box {
    margin-top: 15px;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: none;
}

.result {
    margin-top: 15px;
    text-align: center;
    font-size: 18px;
    padding:10px;
    background: rgba(0,0,0,0.3);
    border-radius:10px;
}

.greenText { color: #00e676; }
.redText { color: #ff5252; }

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

.green { background: #25D366; }
.blue { background: #2196F3; }

.history {
    margin-top:20px;
    background:#00000080;
    padding:10px;
    border-radius:10px;
    max-height:200px;
    overflow-y:auto;
}
</style>
</head>

<body>

<div class="container">

<h2>📊 CSP CASH LEDGER</h2>

<div class="box">
<label>Opening Balance</label>
<input type="number" id="opening" value="0" oninput="calculate()">
</div>

<div class="box">
<label>Cash Receive</label>
<input type="number" id="receive" value="0" oninput="calculate()">
</div>

<div class="box">
<label>Cash Payment</label>
<input type="number" id="payment" value="0" oninput="calculate()">
</div>

<div class="box">
<label>KO Withdrawal / Settlement</label>
<input type="number" id="transfer" value="0" oninput="calculate()">
</div>

<div class="box">
<label>Closing Balance</label>
<input type="number" id="closingInput" value="0" oninput="calculate()">
</div>

<div class="result" id="totalPayment">Total Payment: ₹0</div>
<div class="result" id="totalReceive">Total Receive: ₹0</div>
<div class="result" id="difference">Difference: ₹0</div>

<button class="green" onclick="shareReport()">📤 Share Report</button>
<button class="blue" onclick="saveReport()">💾 Save Daily Report</button>

<div class="history" id="history"></div>

</div>

<script>
function calculate(){

let opening = +openingInput.value || 0;
let receive = +receiveInput.value || 0;
let payment = +paymentInput.value || 0;
let transfer = +transferInput.value || 0;
let closing = +closingInput.value || 0;

// Total Payment
let totalPayment = opening + payment;

// Total Receive
let totalReceive = receive + transfer + closing;

totalPaymentDiv.innerText = "Total Payment: ₹" + totalPayment;
totalReceiveDiv.innerText = "Total Receive: ₹" + totalReceive;

// Difference
let diff = totalReceive - totalPayment;
differenceDiv.innerText = "Difference: ₹" + diff;

differenceDiv.classList.remove("greenText","redText");
if(diff>0) differenceDiv.classList.add("greenText");
else if(diff<0) differenceDiv.classList.add("redText");

saveLocal();
}

// Elements
const openingInput = document.getElementById("opening");
const receiveInput = document.getElementById("receive");
const paymentInput = document.getElementById("payment");
const transferInput = document.getElementById("transfer");
const closingInput = document.getElementById("closingInput");

const totalPaymentDiv = document.getElementById("totalPayment");
const totalReceiveDiv = document.getElementById("totalReceive");
const differenceDiv = document.getElementById("difference");

// Save current data
function saveLocal(){
let data={
opening:openingInput.value,
receive:receiveInput.value,
payment:paymentInput.value,
transfer:transferInput.value,
closing:closingInput.value
};
localStorage.setItem("ledgerData",JSON.stringify(data));
}

// Load
function loadLocal(){
let data=JSON.parse(localStorage.getItem("ledgerData"));
if(!data) return;

openingInput.value=data.opening;
receiveInput.value=data.receive;
paymentInput.value=data.payment;
transferInput.value=data.transfer;
closingInput.value=data.closing;

calculate();
}

// Generate report
function generateReport(){
return `
📊 CSP LEDGER REPORT

Opening: ₹${openingInput.value}
Receive: ₹${receiveInput.value}
Payment: ₹${paymentInput.value}
Transfer: ₹${transferInput.value}
Closing: ₹${closingInput.value}

Total Payment: ₹${openingInput.value*1 + paymentInput.value*1}
Total Receive: ₹${receiveInput.value*1 + transferInput.value*1 + closingInput.value*1}
`;
}

// Share
function shareReport(){
let text=generateReport();
window.open("https://wa.me/?text="+encodeURIComponent(text));
}

// Save history
function saveReport(){
let history=JSON.parse(localStorage.getItem("ledgerHistory"))||[];

history.unshift({
date:new Date().toLocaleString(),
text:generateReport()
});

localStorage.setItem("ledgerHistory",JSON.stringify(history));
loadHistory();
}

// Load history
function loadHistory(){
let history=JSON.parse(localStorage.getItem("ledgerHistory"))||[];
let box=document.getElementById("history");

box.innerHTML="<b>📅 HISTORY</b>";

history.forEach(h=>{
box.innerHTML+=`<hr>${h.date}<pre>${h.text}</pre>`;
});
}

// Init
loadLocal();
loadHistory();
calculate();
</script>

</body>
</html>
