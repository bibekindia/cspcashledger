<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CASH DRAWER</title>   

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial;
}

body {
    background: #000;
    color: #fff;
}

.container {
    max-width: 360px;
    margin: auto;
    padding: 10px;
}

h2{
    text-align:center;
    margin-bottom:10px;
    font-size:18px;
}

/* Row fixed layout */
.row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #0f0;
    padding: 6px 0;
}

/* Fixed columns */
.note { 
    width: 60px;
    font-size: 16px; 
    font-weight: bold; 
}

.controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 110px; /* fixed */
}

/* Buttons */
.circle {
    width: 28px;
    height: 28px;
    font-size: 16px;
    border-radius: 50%;
    border: none;
}

.plus { background: green; color: white; }
.minus { background: red; color: white; }

/* Fixed input */
input {
    width: 45px;
    height: 28px;
    font-size: 14px;
    text-align: center;
    flex-shrink: 0;
}

/* Total column */
.total {
    width: 70px;
    text-align: right;
}

/* Section inputs */
.section{
    margin-top:10px;
}

.section label{
    font-size:13px;
}

.section input {
    width: 100%;
    padding: 6px;
    margin-top: 4px;
    margin-bottom: 8px;
    font-size:14px;
}

/* Total */
.final {
    text-align: center;
    margin-top: 10px;
    font-size: 16px;
    color: yellow;
}

/* Buttons */
.big-btn {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
}

.green { background: #25D366; }
.blue { background: #2196F3; }

/* History */
.history {
    margin-top: 10px;
    background: #111;
    padding: 8px;
    border-radius: 6px;
    max-height: 150px;
    overflow-y: auto;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="container">

<h2>💰 CASH DRAWER PRO</h2>

<div id="list"></div>

<div class="section">
    <label>BANK BALANCE</label>
    <input type="number" id="bank" value="0" oninput="update()">

    <label>WALLET / CSP ID BALANCE</label>
    <input type="number" id="wallet" value="0" oninput="update()">
</div>

<div class="final" id="grandTotal">TOTAL: ₹0</div>

<button class="big-btn green" onclick="shareWhatsApp()">📤 SHARE</button>
<button class="big-btn blue" onclick="saveReport()">💾 SAVE</button>

<div class="history" id="history"></div>

</div>

<script>
const notes = [500,200,100,50,20,10];
const list = document.getElementById("list");

notes.forEach(value=>{
    let row=document.createElement("div");
    row.className="row";

    row.innerHTML=`
    <div class="note">₹${value}</div>
    <div class="controls">
        <button class="circle minus" onclick="change(this,-1)">-</button>
        <input type="number" value="0" oninput="update()">
        <button class="circle plus" onclick="change(this,1)">+</button>
    </div>
    <div class="total">₹0</div>
    `;

    list.appendChild(row);
});

function change(btn,val){
    let input=btn.parentElement.querySelector("input");
    let num=parseInt(input.value)||0;
    num+=val;
    if(num<0) num=0;
    input.value=num;
    update();
}

const bankInput=document.getElementById("bank");
const walletInput=document.getElementById("wallet");
const grandTotal=document.getElementById("grandTotal");

function update(){
    let rows=document.querySelectorAll(".row");
    let grand=0;

    rows.forEach((row,i)=>{
        let count=parseInt(row.querySelector("input").value)||0;
        let total=count*notes[i];
        row.querySelector(".total").innerText="₹"+total;
        grand+=total;
    });

    let bank=parseFloat(bankInput.value)||0;
    let wallet=parseFloat(walletInput.value)||0;

    grand+=bank+wallet;
    grandTotal.innerText="TOTAL: ₹"+grand;

    saveLocal();
}

function saveLocal(){
    let data={
        notes:[],
        bank:bankInput.value,
        wallet:walletInput.value
    };

    document.querySelectorAll(".row input").forEach(i=>{
        data.notes.push(i.value);
    });

    localStorage.setItem("cashData",JSON.stringify(data));
}

function loadLocal(){
    let data=JSON.parse(localStorage.getItem("cashData"));
    if(!data) return;

    document.querySelectorAll(".row input").forEach((i,index)=>{
        i.value=data.notes[index];
    });

    bankInput.value=data.bank;
    walletInput.value=data.wallet;

    update();
}

function shareWhatsApp(){
    let text=generateReport();
    window.open("https://wa.me/?text="+encodeURIComponent(text));
}

function generateReport(){
    let rows=document.querySelectorAll(".row");
    let text="📊 DAILY REPORT\n\n";
    let grand=0;

    rows.forEach((row,i)=>{
        let count=parseInt(row.querySelector("input").value)||0;
        let total=count*notes[i];
        if(count>0){
            text+=`₹${notes[i]} x ${count} = ₹${total}\n`;
        }
        grand+=total;
    });

    let bank=parseFloat(bankInput.value)||0;
    let wallet=parseFloat(walletInput.value)||0;

    text+=`\nBANK: ₹${bank}`;
    text+=`\nWALLET: ₹${wallet}`;

    grand+=bank+wallet;

    text+=`\n\nTOTAL: ₹${grand}`;
    return text;
}

function saveReport(){
    let history=JSON.parse(localStorage.getItem("history"))||[];

    let report={
        date:new Date().toLocaleString(),
        text:generateReport()
    };

    history.unshift(report);
    localStorage.setItem("history",JSON.stringify(history));

    loadHistory();
}

function loadHistory(){
    let history=JSON.parse(localStorage.getItem("history"))||[];
    let box=document.getElementById("history");

    box.innerHTML="<b>📅 HISTORY</b>";

    history.forEach(h=>{
        box.innerHTML+=`<hr>${h.date}<br><pre>${h.text}</pre>`;
    });
}

loadLocal();
loadHistory();
</script>

</body>
</html>
