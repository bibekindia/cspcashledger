<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSP Home</title>

<style>
body{
    font-family: Arial;
    background:#111;
    color:white;
    text-align:center;
}

h2{
    margin-top:30px;
}

.menu{
    margin-top:40px;
}

/* Menu Button */
a{
    display:block;
    margin:20px auto;
    padding:18px;
    width:80%;
    max-width:300px;
    background:#333;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-size:18px;
}

/* Login Box */
.login-box{
    margin-top:50px;
}

input{
    display:block;
    margin:10px auto;
    padding:12px;
    width:80%;
    max-width:250px;
    border:none;
    border-radius:8px;
}

button{
    padding:12px 20px;
    margin:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.logout{
    background:red;
    color:white;
}
</style>
</head>

<body>

<h2>CSP HOME MENU</h2>

<!-- 🔐 Login Section -->
<div id="loginBox" class="login-box">
    <input type="email" id="email" placeholder="Enter Email">
    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="login()">Login</button>
    <button onclick="signup()">Create Account</button>
</div>

<!-- 📊 Menu Section -->
<div id="menuBox" class="menu" style="display:none;">
    <a href="drawer.html">💰 CASH DRAWER</a>
    <a href="ledger.html">📊 CSP CASH LEDGER</a>

    <button class="logout" onclick="logout()">Logout</button>
</div>

<!-- 🔥 Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getAuth, 
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// ✅ তোমার Firebase Config (correctly added)
const firebaseConfig = {
  apiKey: "AIzaSyBg1968DR9gbfsLQrP3hB8Ti5W8m2Wm9NI",
  authDomain: "cspcashledger-9e4e3.firebaseapp.com",
  projectId: "cspcashledger-9e4e3",
  storageBucket: "cspcashledger-9e4e3.firebasestorage.app",
  messagingSenderId: "845505235150",
  appId: "1:845505235150:web:3525513789b717fd78a89f"
};

// 🔥 Initialize Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// UI Elements
const loginBox = document.getElementById("loginBox");
const menuBox = document.getElementById("menuBox");

// 🔐 Login Function
window.login = function(){
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if(!email || !password){
        alert("Please enter email & password");
        return;
    }

    signInWithEmailAndPassword(auth, email, password)
    .then(() => alert("Login Success ✅"))
    .catch(err => alert(err.message));
}

// 🆕 Signup Function
window.signup = function(){
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if(password.length < 6){
        alert("Password must be at least 6 characters");
        return;
    }

    createUserWithEmailAndPassword(auth, email, password)
    .then(() => alert("Account Created ✅"))
    .catch(err => alert(err.message));
}

// 🔄 Auto Login Detect (Important)
onAuthStateChanged(auth, user => {
    if(user){
        console.log("User Logged In:", user.email);
        loginBox.style.display = "none";
        menuBox.style.display = "block";
    }else{
        loginBox.style.display = "block";
        menuBox.style.display = "none";
    }
});

// 🚪 Logout
window.logout = function(){
    signOut(auth)
    .then(() => alert("Logged Out"))
    .catch(err => alert(err.message));
}

</script>

</body>
</html>
