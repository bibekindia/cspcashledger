    color:white;
    display:flex;
    justify-content:center;
    align-items:flex-start; /* moved to top */

    padding-top:60px; /* control top position */

    width:90%;
    max-width:400px;
    text-align:center;
}

    margin-bottom:30px;
    font-size:22px;
}

    display:block;
    margin:15px 0;

    background:#222;
    color:white;
    text-decoration:none;
    border-radius:12px;
    font-size:16px;
    transition:0.3s;
}

.menu a:hover{

    body{
        padding-top:40px; /* mobile e aro balanced */
